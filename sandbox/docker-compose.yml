# The firewall + workload stack — the sandbox's egress boundary as topology.
#
# THE TOPOLOGY INVARIANT (the crown jewel — do not degrade it to an IP allowlist):
# the workload container sits on the `sandbox` network, which is `internal: true`
# — Docker attaches NO gateway route off it. The firewall is the only dual-homed
# service (sandbox + egress) and never enables forwarding or MASQUERADE (its
# FORWARD policy is DROP), so the workload has NO L3 route to any external IP.
# Its only egress is L7: squid at the firewall (${SANDBOX_IP}:3128), plus DNS at
# the firewall's dnsmasq. Unsetting http_proxy inside the workload gains nothing
# — there is no route at all — which is what makes squid's name-level allowlist
# and per-method ro tier unbypassable, and its access log a complete egress log.
#
# The launcher (bin/agent-sandbox) parameterizes this file per session via env
# vars (subnet, images, allowlist tiers) plus a generated override carrying the
# Workload record's env/user/workspace binding. Compose-relative paths (seccomp)
# resolve against THIS file's directory; anything that relocates the compose must
# absolutize them.

services:
  firewall:
    image: ${FIREWALL_IMAGE:-agent-sandbox-firewall:local}
    # tini as PID 1: init-firewall backgrounds dnsmasq/squid/the DNS refresher;
    # without a reaper their exits accumulate as zombies against pids_limit.
    init: true
    # Everything dropped, then only what the firewall's job needs:
    #   NET_ADMIN/NET_RAW      — iptables/ip6tables/ipset (and the -m set match's
    #                            SOCK_RAW socket on some kernels)
    #   NET_BIND_SERVICE       — dnsmasq :53, squid :3128
    #   CHOWN/DAC_OVERRIDE     — root-owned config files handed to proxy group
    #   SETUID/SETGID/SETPCAP  — dnsmasq and squid drop their own privileges
    #   KILL                   — the refresh loop drains dnsmasq (pkill) to rebind
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - SETPCAP
      - KILL
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-firewall.json
    pids_limit: 64
    environment:
      SANDBOX_IP: ${SANDBOX_IP:-172.30.0.2}
      SANDBOX_SUBNET: ${SANDBOX_SUBNET:-172.30.0.0/24}
      WORKLOAD_ALLOWED_DOMAINS_RO: ${WORKLOAD_ALLOWED_DOMAINS_RO:-}
      WORKLOAD_ALLOWED_DOMAINS_RW: ${WORKLOAD_ALLOWED_DOMAINS_RW:-}
      AGENT_SANDBOX_FIREWALL_SKIP_VERIFY: ${AGENT_SANDBOX_FIREWALL_SKIP_VERIFY:-0}
      AGENT_SANDBOX_DNS_CACHE: ${AGENT_SANDBOX_DNS_CACHE:-1}
      AGENT_SANDBOX_TRACE: ${AGENT_SANDBOX_TRACE:-}
      DANGEROUSLY_SKIP_FIREWALL: ${DANGEROUSLY_SKIP_FIREWALL:-}
      EGRESS_QUOTA_MB: ${EGRESS_QUOTA_MB:-}
      CONTROL_PLANE_EGRESS_GRANTS: ${CONTROL_PLANE_EGRESS_GRANTS:-}
    # The sentinel gates everything: init-firewall runs set -Eeuo pipefail and
    # exits non-zero on any failure, so /tmp/firewall-ready never appears, the
    # healthcheck never flips, and the workload (depends_on: service_healthy)
    # never starts — fail closed by construction.
    command:
      - bash
      - -c
      - |
        /usr/local/bin/init-firewall.bash \
          && touch /tmp/firewall-ready \
          && exec sleep infinity
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/firewall-ready"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 60s
      start_interval: 250ms
    networks:
      sandbox:
        ipv4_address: ${SANDBOX_IP:-172.30.0.2}
      egress: {}
    volumes:
      # The tamper-evident egress log (squid access.log). A named volume so the
      # workload cannot touch it (it is mounted nowhere else) and the launcher
      # can export it before teardown.
      - egress-log:/var/log/squid
      # Cross-session DNS cache (firewall-only; see init-firewall.bash for why
      # workload-unwritable placement is load-bearing).
      - dns-cache:/var/cache/agent-sandbox

  # Transient root init service: runs every executable in the read-only
  # /run/hardener-hooks.d mount (the /dev/null default = no hooks = no-op
  # success), writing hardened config into the shared hardened-config volume the
  # workload mounts read-only. Fail closed: a failing hook exits the service
  # non-zero and the workload's service_completed_successfully gate never opens.
  # Profile-gated (default-on via COMPOSE_PROFILES from stack_run) because
  # compose cannot REMOVE a service through an override — absence is expressed
  # by not activating the profile.
  hardener:
    image: ${FIREWALL_IMAGE:-agent-sandbox-firewall:local}
    profiles: ["hardener"]
    user: root
    init: true
    # No network at all: the hooks' contract is config-writing, not fetching —
    # and a netns-less hardener can never race a sibling's static IP claim.
    network_mode: none
    cap_drop:
      - ALL
    # CHOWN/DAC_OVERRIDE: hooks run as root and may hand hardened files in the
    # shared volume to the (arbitrary-uid) workload user.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-default.json
    pids_limit: 64
    environment:
      AGENT_SANDBOX_TRACE: ${AGENT_SANDBOX_TRACE:-}
      HARDENED_CONFIG_DIR: /run/hardened-config
    command:
      - bash
      - /usr/local/bin/hardener-entrypoint.bash
    volumes:
      # The hooks the hardener executes, read-only so a hook can never rewrite
      # its siblings. /dev/null when the launcher wires no hooks dir — the
      # entrypoint treats a non-directory as "no hooks" (no-op success).
      - ${HARDENER_HOOKS_DIR:-/dev/null}:/run/hardener-hooks.d:ro
      # Writable HERE only; the workload mounts the same volume read-only, so
      # it can consume hardened config but never forge it.
      - hardened-config:/run/hardened-config

  # Tamper-evident append-only audit sink (sandbox/audit_sink.py): owns the
  # per-session HMAC secret and the chained audit log on volumes the workload
  # never mounts, so the workload can neither forge nor rewrite the record.
  # Profile-gated default-on, same mechanism as the hardener.
  audit:
    image: ${FIREWALL_IMAGE:-agent-sandbox-firewall:local}
    profiles: ["audit"]
    user: root
    # tini as PID 1 so SIGTERM reaches the server instead of being ignored by a
    # bare PID-1 python and SIGKILLed at the stop timeout.
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp:./seccomp-default.json
    read_only: true
    tmpfs:
      - /tmp:size=16m
    pids_limit: 64
    networks:
      sandbox:
        # Static .4 (firewall .2, workload .3): the sink pins its own address so
        # a client reaches it at a fixed IP independent of attach order.
        ipv4_address: ${SANDBOX_IP_AUDIT:-172.30.0.4}
    environment:
      AUDIT_LOG: /var/log/agent-sandbox/audit.jsonl
      AUDIT_SECRET_PATH: /run/audit-secret/secret
      AUDIT_SINK_PORT: ${AUDIT_SINK_PORT:-9198}
      AGENT_SANDBOX_TRACE: ${AGENT_SANDBOX_TRACE:-}
    command:
      - python3
      - /usr/local/bin/audit_sink.py
    healthcheck:
      # Ready = the HMAC secret is minted AND the sink's port is bound, so a
      # consumer gating on audit health knows records can be authenticated.
      test:
        - CMD-SHELL
        - test -f /run/audit-secret/secret && python3 -c "import os, socket; socket.create_connection(('127.0.0.1', int(os.environ['AUDIT_SINK_PORT'])), timeout=2).close()"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
      start_interval: 250ms
    volumes:
      # The chained audit log and the HMAC secret, writable ONLY here — the
      # workload mounts neither, which is what makes the chain tamper-evident
      # against the workload rather than merely tamper-evident in general.
      - audit-log:/var/log/agent-sandbox
      - audit-secret:/run/audit-secret

  workload:
    image: ${WORKLOAD_IMAGE:?the launcher must export WORKLOAD_IMAGE from the Workload record}
    user: ${WORKLOAD_USER:-1000}
    runtime: ${WORKLOAD_RUNTIME:-runc}
    init: true
    depends_on:
      firewall:
        condition: service_healthy
      # required:false is the profile escape hatch: when a workload opts out
      # (its profile inactive, so the service does not exist in the rendered
      # model) compose ignores the dependency instead of failing `up`. With the
      # profile active the full fail-closed gate applies.
      hardener:
        condition: service_completed_successfully
        required: false
      audit:
        condition: service_healthy
        required: false
    # The container idles; the launcher seeds /workspace, then execs the Workload's
    # entrypoint argv, so the workload never runs against a half-seeded tree.
    entrypoint: ["sleep", "infinity"]
    cap_drop:
      - ALL
    # CHOWN is the one capability restored: the launcher's seed step execs as
    # root to hand the fresh /workspace volume (root-owned by Docker) to the
    # workload user. The workload process itself runs as an unprivileged uid
    # with no-new-privileges, so it can never exercise it.
    cap_add:
      - CHOWN
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 512
    environment:
      # All HTTP(S) tooling routes through squid at the firewall. This is
      # convenience, not the boundary — the `internal` network is the boundary.
      http_proxy: http://${SANDBOX_IP:-172.30.0.2}:3128
      https_proxy: http://${SANDBOX_IP:-172.30.0.2}:3128
      HTTP_PROXY: http://${SANDBOX_IP:-172.30.0.2}:3128
      HTTPS_PROXY: http://${SANDBOX_IP:-172.30.0.2}:3128
      no_proxy: localhost,127.0.0.1,${SANDBOX_IP:-172.30.0.2}
      NO_PROXY: localhost,127.0.0.1,${SANDBOX_IP:-172.30.0.2}
      # A writable HOME on the read-only rootfs: the workload user is an
      # arbitrary uid with no passwd entry, and git (among others) needs one.
      HOME: /tmp
      # Where the read-only control-plane rendezvous surface is mounted, so
      # in-workload hook clients need no hardcoded path.
      CONTROL_PLANE_DIR: /run/control-plane
    dns:
      - ${SANDBOX_IP:-172.30.0.2}
    networks:
      sandbox:
        ipv4_address: ${WORKLOAD_IP:-172.30.0.3}
    volumes:
      - workspace:/workspace
      # Hardened config the hardener produced, read-only: the workload consumes
      # it but can never rewrite it. An empty volume when the hardener profile
      # is off (or no hooks ran) — a harmless empty dir.
      - hardened-config:/run/hardened-config:ro
      # Control-plane rendezvous surface: consumers mount this same volume
      # read-write in their --extra-compose services to publish ready markers
      # (<name>.ready) and rendezvous config; the workload can read, never write.
      - control-plane:/run/control-plane:ro

networks:
  sandbox:
    # `internal: true` is the load-bearing line: no gateway route off this
    # network exists in the workload's netns.
    internal: true
    ipam:
      config:
        - subnet: ${SANDBOX_SUBNET:-172.30.0.0/24}
  egress:
    driver: bridge

volumes:
  egress-log:
  dns-cache:
  workspace:
  hardened-config:
  # The audit sink's log + HMAC secret. Only the audit service mounts them;
  # keeping the workload off both is the tamper-evidence boundary.
  audit-log:
  audit-secret:
  # Consumer control-plane rendezvous: ready markers + config, rw in consumer
  # overlay services, ro in the workload (docs/control-plane.md).
  control-plane:
