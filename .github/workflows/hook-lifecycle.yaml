name: Hook lifecycle

# Required check (via the hook-lifecycle-passed reporter): runs the full Claude hook
# lifecycle (session setup -> pre-commit -> pre-push) on a clean checkout, so a
# broken hook is caught in CI rather than in a session. The lifecycle job is
# expensive, so a `decide` job gates it to PRs that actually touch hook-relevant
# paths (a skipped job is a passing required check); the reporter always runs so the
# required check always reports. No `pull_request` paths filter — a path-filtered
# required check hangs at "Expected — Waiting" forever. The push trigger keeps its
# paths filter to skip redundant post-merge runs.

on:
  push:
    branches: ["main"]
    paths:
      - ".claude/hooks/**"
      - ".hooks/**"
      - "setup.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".github/scripts/run-hook-lifecycle.sh"
      - ".github/scripts/hook-lifecycle-decide.sh"
      - ".github/workflows/hook-lifecycle.yaml"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job-level path gate: keeps the expensive lifecycle off PRs that can't affect the
  # hooks, while the workflow still always fires so the required reporter reports.
  decide:
    name: Decide (hook lifecycle)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.c.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: c
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash .github/scripts/hook-lifecycle-decide.sh

  hook-lifecycle:
    needs: decide
    if: needs.decide.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup base environment
        uses: ./.github/actions/setup-base-env
        with:
          setup-python: "true"

      - name: Run hook lifecycle
        run: bash .github/scripts/run-hook-lifecycle.sh

  # Stable Required check: runs even when hook-lifecycle is skipped (paths not
  # touched) or cancelled, so a protected branch never gets stuck on a check that
  # never reports. A skipped lifecycle job is not a failure, so the gate passes.
  hook-lifecycle-passed: # required-check: true
    if: always()
    needs: [decide, hook-lifecycle]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
