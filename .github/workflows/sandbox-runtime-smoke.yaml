name: Sandbox runtime smoke

# Required check (via the runtime-smoke-passed reporter): a Docker smoke that
# installs gVisor/runsc on the runner and proves the extracted runtime-detect ladder
# + backend seam SELECT a runtime AND that Docker can actually RUN a container under
# it (registration in `docker info` is not enough — a listed-but-broken runtime dies
# deep in a launch). It uses CI's Docker daemon (this repo's dev sandbox lacks one).
# No paths filter, so it always fires and reports. gVisor unavailability degrades to
# a runc-only smoke rather than failing the job.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Installs+registers runsc (checksum-verified, degrading to runc-only if it
      # can't install), then runs the ladder smoke: backend_select_runtime picks a
      # runtime that runs a throwaway container, and a bogus CONTAINER_RUNTIME is
      # refused fail-closed.
      - name: Runtime ladder install + smoke (runc always; gVisor if installable)
        run: bash .github/scripts/run-sandbox-runtime-smoke.sh

  # Stable Required check: runs even when runtime-smoke is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  runtime-smoke-passed: # required-check: true
    if: always()
    needs: [runtime-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
