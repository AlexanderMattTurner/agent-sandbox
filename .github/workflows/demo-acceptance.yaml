name: Demo workload acceptance (e2e)

# Required check (via the demo-acceptance-passed reporter): Docker end-to-ends that
# run the real launcher against the shipped demo workloads on CI's daemon (this
# repo's dev sandbox has no Docker). demo-acceptance (seed mode): a non-claude workload boots, is
# egress-restricted to exactly its declared allowlist (denied at the proxy AND in
# the egress log; allowed host splices through AND is logged), its writes land on a
# review branch, and the ephemeral teardown leaves nothing behind. bind-acceptance
# (bind mode): the workload's declared overmount_paths are kernel-enforced read-only
# from inside the sandbox (asserted by the workload AND the launcher's fail-closed
# probe) while the rest of /workspace stays writable and lands on the host bind.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  demo-acceptance:
    name: agent-sandbox run demo-bash (egress + review-branch acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the demo workload end-to-end and assert the acceptance
        run: bash .github/scripts/run-demo-acceptance.sh

  bind-acceptance:
    name: agent-sandbox run demo-bind (read-only overmount guardrail acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the bind-mode workload end-to-end and assert the guardrails are read-only
        run: bash .github/scripts/run-bind-acceptance.sh

  # Stable Required check: runs even when either acceptance job is cancelled/skipped,
  # so a protected branch never gets stuck on a check that never reports.
  demo-acceptance-passed: # required-check: true
    if: always()
    needs: [demo-acceptance, bind-acceptance]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
