name: Demo workload acceptance (e2e)

# NOT a required check: a Docker end-to-end that runs the real launcher against
# the shipped demo workload on the runner's daemon (this repo's dev sandbox has
# no Docker). The acceptance: a non-claude workload boots, is egress-restricted
# to exactly its declared allowlist (denied at the proxy AND in the egress log;
# allowed host splices through AND is logged), its writes land on a review
# branch, and the ephemeral teardown leaves nothing behind.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  demo-acceptance:
    name: agent-sandbox run demo-bash (egress + review-branch acceptance)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run the demo workload end-to-end and assert the acceptance
        run: bash .github/scripts/run-demo-acceptance.sh
