name: gVisor isolation smoke

# A Docker end-to-end that installs the real runsc
# (gVisor) runtime and asserts a runsc-launched container enforces process, device,
# network, filesystem, and capability isolation. It runs on the GitHub runner's
# Docker daemon (which this repo's dev sandbox lacks). No paths filter so it always
# reports and is easy to reason about.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runsc-smoke: # required-check: true
    name: gVisor (runsc) isolation smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Installs a pinned, checksum-verified runsc, registers it with Docker, then
      # runs the isolation assertions. Root is required to install the runtime and
      # reload the daemon — do NOT --cap-drop the step itself.
      - name: Install runsc and run gVisor isolation smoke
        run: sudo bash .github/scripts/run-runsc-smoke.sh
