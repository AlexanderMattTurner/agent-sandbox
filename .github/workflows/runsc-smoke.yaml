name: gVisor isolation smoke

# Required check (via the runsc-smoke-passed reporter): a Docker end-to-end that
# installs the real runsc (gVisor) runtime and asserts a runsc-launched container
# enforces process, device, network, filesystem, and capability isolation. It runs
# on CI's Docker daemon (this repo's dev sandbox lacks one). No paths filter, so it
# always fires and reports.
on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runsc-smoke:
    name: gVisor (runsc) isolation smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Installs a pinned, checksum-verified runsc, registers it with Docker, then
      # runs the isolation assertions. Root is required to install the runtime and
      # reload the daemon — do NOT --cap-drop the step itself.
      - name: Install runsc and run gVisor isolation smoke
        run: sudo bash .github/scripts/run-runsc-smoke.sh

  # Stable Required check: runs even when runsc-smoke is cancelled/skipped, so a
  # protected branch never gets stuck on a check that never reports.
  runsc-smoke-passed: # required-check: true
    if: always()
    needs: [runsc-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not pass
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
